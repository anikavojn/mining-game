<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Mining Simulator 747 — Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0c10;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 30% 30%, #2a333f 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .auth-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 420px;
        }
        .auth-box {
            background: linear-gradient(135deg, #1a2a2a, #0f1a1f);
            border: 3px solid #ffaa33;
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 0 50px rgba(255,170,51,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #ffcc66;
            font-size: 24px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #ffaa33;
        }
        .logo p {
            color: #8cc9ff;
            font-size: 11px;
            margin-top: 8px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #8cc9ff;
            font-size: 11px;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%;
            background: #0a1118;
            border: 2px solid #2a5f7a;
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            color: #ffdd99;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #ffaa66;
            box-shadow: 0 0 8px rgba(255,170,102,0.3);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #2a5f7a;
            border: 2px solid #ffaa33;
            border-radius: 40px;
            color: #ffdd99;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateX(-3px);
            background: #3a7f9a;
            box-shadow: 0 0 15px rgba(255,170,51,0.3);
        }
        .switch {
            text-align: center;
            margin-top: 20px;
            color: #6f9fbf;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .switch:hover {
            color: #ffaa66;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 11px;
            padding: 8px;
            border-radius: 10px;
        }
        .error { color: #ff8888; background: rgba(255,68,68,0.1); }
        .success { color: #88ff88; background: rgba(136,255,136,0.1); }
        hr {
            border: none;
            height: 1px;
            background: #2a5f7a;
            margin: 20px 0;
        }
        .solana-icon {
            width: 24px;
            height: 24px;
            vertical-align: middle;
            margin-right: 8px;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-box">
        <div class="logo">
            <h1>
                <svg class="solana-icon" viewBox="0 0 32 32" fill="none" style="display: inline-block;">
                    <path d="M8.5 10.5L21.5 4L26 8.5L13 15L8.5 10.5Z" fill="url(#grad1)"/>
                    <path d="M8.5 19.5L21.5 13L26 17.5L13 24L8.5 19.5Z" fill="url(#grad2)"/>
                    <path d="M8.5 28.5L21.5 22L26 26.5L13 33L8.5 28.5Z" fill="url(#grad3)"/>
                    <defs>
                        <linearGradient id="grad1" x1="8.5" y1="4" x2="26" y2="10.5"><stop stop-color="#9945FF"/><stop offset="1" stop-color="#14F195"/></linearGradient>
                        <linearGradient id="grad2" x1="8.5" y1="13" x2="26" y2="19.5"><stop stop-color="#9945FF"/><stop offset="1" stop-color="#14F195"/></linearGradient>
                        <linearGradient id="grad3" x1="8.5" y1="22" x2="26" y2="28.5"><stop stop-color="#9945FF"/><stop offset="1" stop-color="#14F195"/></linearGradient>
                    </defs>
                </svg>
                MINING SIMULATOR 747
            </h1>
            <p>HARDCORE EDITION</p>
        </div>

        <div id="loginForm">
            <div class="input-group">
                <label>⚡ ИМЯ ОПЕРАТОРА</label>
                <input type="text" id="username" placeholder="MINER_747">
            </div>
            <div class="input-group">
                <label>🔐 КЛЮЧ ДОСТУПА</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn" onclick="doLogin()">▶ ВОЙТИ В СИСТЕМУ</button>
            <div class="switch" onclick="showRegister()">📝 НЕТ АККАУНТА? РЕГИСТРАЦИЯ</div>
        </div>

        <div id="registerForm" style="display:none;">
            <div class="input-group">
                <label>👤 НИКНЕЙМ</label>
                <input type="text" id="regUsername" placeholder="MINER_747">
            </div>
            <div class="input-group">
                <label>📧 EMAIL</label>
                <input type="email" id="regEmail" placeholder="miner@mining.com">
            </div>
            <div class="input-group">
                <label>🔐 ПАРОЛЬ</label>
                <input type="password" id="regPassword" placeholder="••••••••">
            </div>
            <button class="btn" onclick="doRegister()">📡 ЗАРЕГИСТРИРОВАТЬСЯ</button>
            <div class="switch" onclick="showLogin()">◀ НАЗАД К ВХОДУ</div>
        </div>

        <div id="message" class="message"></div>
        <hr>
        <div style="text-align: center; font-size: 9px; color: #4a6a8a;">
            SECURE CONNECTION v3.2
        </div>
    </div>
</div>

<script>
    function showRegister() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('message').innerHTML = '';
    }
    
    function showLogin() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('message').innerHTML = '';
    }
    
    async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const msgDiv = document.getElementById('message');
    
    if (!username || !password) {
        msgDiv.innerHTML = '<div class="message error">❌ ЗАПОЛНИТЕ ВСЕ ПОЛЯ</div>';
        return;
    }
    
    msgDiv.innerHTML = '<div class="message success">⏳ ПОДКЛЮЧЕНИЕ...</div>';
    
    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await response.json();  // ← переименовал result в data
        console.log('Ответ сервера:', data);
        
        if (data.success) {
            localStorage.removeItem('mining_token');
localStorage.setItem('mining_token', data.token);
            localStorage.setItem('mining_user', JSON.stringify(data.user));
            msgDiv.innerHTML = '<div class="message success">✅ ДОБРО ПОЖАЛОВАТЬ! ЗАГРУЗКА...</div>';
            setTimeout(() => {
                window.location.href = '/index.html';
            }, 800);
        } else {
            msgDiv.innerHTML = '<div class="message error">❌ ' + data.error + '</div>';
        }
    } catch(err) {
        console.error('Ошибка:', err);
        msgDiv.innerHTML = '<div class="message error">❌ ОШИБКА СОЕДИНЕНИЯ С СЕРВЕРОМ</div>';
    }
}
    
    async function doRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const msgDiv = document.getElementById('message');
    
    if (!username || !email || !password) {
        msgDiv.innerHTML = '<div class="message error">❌ ЗАПОЛНИТЕ ВСЕ ПОЛЯ</div>';
        return;
    }
    
    msgDiv.innerHTML = '<div class="message success">⏳ ПОДКЛЮЧЕНИЕ...</div>';
    
    try {
        const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        const data = await response.json();
        console.log('Ответ сервера:', data);
        
        if (data.success) {
            localStorage.setItem('mining_token', data.token);
            localStorage.setItem('mining_user', JSON.stringify(data.user));
            msgDiv.innerHTML = '<div class="message success">✅ АККАУНТ СОЗДАН! ЗАГРУЗКА...</div>';
            setTimeout(() => {
                window.location.href = '/index.html';
            }, 800);
        } else {
            msgDiv.innerHTML = '<div class="message error">❌ ' + data.error + '</div>';
        }
    } catch(err) {
        console.error('Ошибка:', err);
        msgDiv.innerHTML = '<div class="message error">❌ ОШИБКА СОЕДИНЕНИЯ С СЕРВЕРОМ</div>';
    }
}
    
    if (localStorage.getItem('mining_token')) {
        window.location.href = '/index.html';
    }
</script>

</body>
</html>
